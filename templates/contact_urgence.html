<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Urgence - Destockage Alimentaire Store</title>
  <meta name="description" content="Contactez-nous en urgence pour vos besoins en déstockage alimentaire. Réponse rapide pour professionnels et particuliers." />
  <meta name="robots" content="index, follow" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Contact Urgence - Destockage Alimentaire Store" />
  <meta property="og:description" content="Contactez-nous en urgence pour vos besoins en déstockage alimentaire. Réponse rapide." />
  <meta property="og:url" content="https://www.destockagealimentairestore.com/contact-urgence" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:title" content="Contact Urgence - Destockage Alimentaire Store" />
  <meta name="twitter:description" content="Contactez-nous en urgence pour vos besoins en déstockage alimentaire. Réponse rapide." />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background-color: #f8f9fa;
      color: #333;
    }
    h1 {
      color: #d9534f;
    }
    form {
      max-width: 500px;
      background: #fff;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin: 0.8rem 0 0.3rem;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    button {
      margin-top: 1rem;
      background-color: #d9534f;
      color: white;
      border: none;
      padding: 0.8rem 1.2rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #c9302c;
    }
    .info-text {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Contact Urgence</h1>
  <p>Vous avez une demande urgente pour nos produits alimentaires en déstockage ? Remplissez le formulaire ci-dessous, nous vous répondrons dans les plus brefs délais.</p>

  <form method="POST" action="/send-contact-urgence">
    <label for="name">Nom complet *</label>
    <input type="text" id="name" name="name" required placeholder="Votre nom" />

    <label for="email">Email *</label>
    <input type="email" id="email" name="email" required placeholder="votre.email@example.com" />

    <label for="phone">Téléphone</label>
    <input type="tel" id="phone" name="phone" placeholder="Votre numéro de téléphone" />

    <label for="message">Message *</label>
    <textarea id="message" name="message" required placeholder="Décrivez votre demande urgente..."></textarea>

    <button type="submit">Envoyer</button>
  </form>

  <p class="info-text">* Champs obligatoires</p>

</body>
</html>
